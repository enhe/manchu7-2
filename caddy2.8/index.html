<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>站点公告</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding-top: 100px;
    }
    .box {
      background: #fff;
      display: inline-block;
      padding: 40px 60px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #007acc;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
    }
    a:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📢 公告</h1>
    <p>本站目前处于开发测试阶段，部分功能可能不稳定。</p>
    <p>点击下面按钮进入应用：</p>

    <!-- ⭐ 关键：跳转到 Rails -->
    <a href="/app">进入应用</a>
  </div>
</body>
</html>

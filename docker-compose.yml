services:
  caddy:
    image: caddy:2-alpine
    container_name: manchu7_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy2.8/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - manchu_network7

  mongo:
    image: mongo:8
    container_name: manchu7_mongo
    restart: always
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb8/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - manchu_network7

  valkey:
    image: valkey/valkey:9.0
    container_name: manchu7_valkey
    restart: always
    ports:
      - "6379:6379"
    networks:
      - manchu_network7

  rustfs:
    image: rustfs/rustfs:latest
    container_name: manchu7_rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - ./data:/data        # 数据持久化，可改为 /mnt/rustfs/data:/data
      - ./logs:/var/log/rustfs
    environment:
      - TZ=Asia/Shanghai
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ACCESS_KEY=rustfsadmin      # ⚠️ 生产环境请改强密码
      - RUSTFS_SECRET_KEY=rustfsadmin123!  # ⚠️ 生产环境请改强密码
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - manchu_network7

  web:
    build:
      context: .
      dockerfile: Dockerfile.rails7
    container_name: manchu7_web
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - valkey
    env_file:
      - .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
    command: ["rails", "server", "-b", "0.0.0.0"]
    networks:
      - manchu_network7

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
  data:       # 数据持久化，可改为 /mnt/rustfs/data:/data
  logs:


networks:
  manchu_network7:
    driver: bridge
